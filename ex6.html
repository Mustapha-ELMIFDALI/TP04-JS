<script>
  function fibo1(n) {
    let u0 = 0;
    let u1 = 1;

    if (n == 0) return u0;
    if (n == 1) return u1;

    for (let i = 2; i <= n; i++) {
      let u = u0 + u1;
      u0 = u1;
      u1 = u;
    }

    console.log("Le terme n est :", u1);
  }
  function fibo2(valeur) {
    let u0 = 0;
    let u1 = 1;
    let rang = 1;

    while (u1 <= valeur) {
      let u = u0 + u1;
      u0 = u1;
      u1 = u;
      rang++;
    }

    console.log("Premier terme superieur :", u1, "au rang", rang);
  }

  fibo1(10);
  fibo2(50);
</script>
